<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Склады WB | WB Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="header.js" defer></script>
  <style>
    :root {
      --bg:      #080c10;
      --bg2:     #0d1117;
      --bg3:     #141b24;
      --bg4:     #1a2333;
      --text:    #dde4ee;
      --text2:   #4a5568;
      --accent:  #cb11ab;
      --border:  #1a2333;
      --green:   #22c55e;
      --yellow:  #f59e0b;
      --orange:  #f97316;
      --purple:  #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Geologica', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

    .toolbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 28px; display: flex; align-items: center; gap: 12px; }
    .toolbar-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .last-update { font-size: 12px; color: var(--text2); }
    .btn { border: none; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: .15s; display: flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; display: none; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }

    .main { padding: 16px 28px 40px; }

    .filters { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 10px 20px; align-items: center; }
    .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .filter-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: .12s; }
    .filter-btn:hover { color: var(--text); border-color: #555; }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .summary-card .val { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .summary-card .lbl { font-size: 11px; color: var(--text2); line-height: 1.4; }
    .col-green  { color: var(--green); }
    .col-yellow { color: var(--yellow); }
    .col-orange { color: var(--orange); }
    .col-gray   { color: var(--text2); }

    .error-bar { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 8px; padding: 9px 14px; margin-bottom: 12px; color: #fca5a5; font-size: 13px; display: none; }
    .error-bar.show { display: block; }

    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead th { background: var(--bg3); padding: 8px 6px; font-size: 11px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
    thead th.th-left { text-align: left; padding-left: 14px; }
    thead th.th-center { text-align: center; }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .1s; }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 7px 6px; vertical-align: middle; }

    .td-name { padding: 7px 14px; white-space: nowrap; }
    .wd-name { font-weight: 600; font-size: 13px; }
    .wd-geo  { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .badge-sc { display: inline-block; background: rgba(203,17,171,.15); color: #e879d5; font-size: 10px; border-radius: 4px; padding: 1px 5px; margin-left: 5px; vertical-align: middle; }

    .td-coef { text-align: center; padding: 4px 3px; width: 40px; min-width: 40px; }
    .coef-pill { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 26px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: default; letter-spacing: -.3px; }
    .c-free { background: rgba(34,197,94,.2);   color: #4ade80; }
    .c-1    { background: rgba(134,239,172,.15); color: #86efac; }
    .c-2    { background: rgba(253,224,71,.15);  color: #fde047; }
    .c-3    { background: rgba(253,186,64,.15);  color: #fbbf24; }
    .c-4    { background: rgba(249,115,22,.15);  color: #fb923c; }
    .c-5    { background: rgba(249,115,22,.22);  color: #f97316; }
    .c-high { background: rgba(239,68,68,.18);   color: #fca5a5; }
    .c-off  { background: rgba(55,65,81,.2);     color: #374151; }
    .c-today { box-shadow: 0 0 0 2px var(--accent); }
    .th-today { color: var(--accent) !important; }
    .th-wknd  { color: var(--purple) !important; }

    .td-stat { text-align: center; padding: 7px 8px; white-space: nowrap; }
    .pct-badge { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 12px; font-weight: 500; }
    .pct-ok  { background: rgba(34,197,94,.12);  color: #4ade80; }
    .pct-mid { background: rgba(245,158,11,.12);  color: #fbbf24; }
    .pct-hi  { background: rgba(239,68,68,.12);   color: #fca5a5; }
    .min-coef-date { display: block; font-size: 10px; color: var(--text2); margin-top: 2px; }

    .state-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 48px 32px; text-align: center; color: var(--text2); }
    .state-box .ico { font-size: 48px; margin-bottom: 14px; }
    .state-box h3   { color: var(--text); font-size: 16px; margin-bottom: 8px; }
    .state-box p    { font-size: 13px; line-height: 1.7; }

    .legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 10px 14px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-pill { width: 30px; height: 20px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Склады Wildberries — коэффициенты приёмки</span>
  <span class="last-update" id="lastUpdate">нет данных</span>
  <button class="btn btn-primary" id="btnRefresh" onclick="loadData()">
    <div class="spinner"></div>
    <span class="btn-text">🔄 Обновить</span>
  </button>
</div>

<div class="main">
  <div class="error-bar" id="errBar"></div>

  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Макс. коэф:</span>
      <div style="display:flex;gap:4px">
        <button class="filter-btn"        data-mxc="999" onclick="setMxc(this,999)">Все</button>
        <button class="filter-btn active" data-mxc="5"   onclick="setMxc(this,5)">≤ 5</button>
        <button class="filter-btn"        data-mxc="3"   onclick="setMxc(this,3)">≤ 3</button>
        <button class="filter-btn"        data-mxc="1"   onclick="setMxc(this,1)">≤ 1</button>
        <button class="filter-btn"        data-mxc="0"   onclick="setMxc(this,0)">Бесплатно</button>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Тип:</span>
      <div style="display:flex;gap:4px">
        <button class="filter-btn active" data-tp="all" onclick="setTp(this,'all')">Все</button>
        <button class="filter-btn"        data-tp="wh"  onclick="setTp(this,'wh')">Склады</button>
        <button class="filter-btn"        data-tp="sc"  onclick="setTp(this,'sc')">СЦ</button>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Поставка:</span>
      <div id="fBox" style="display:flex;gap:4px"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Логистика:</span>
      <div style="display:flex;gap:4px">
        <button class="filter-btn active" data-log="9999" onclick="setLog(this,9999)">Все</button>
        <button class="filter-btn"        data-log="125"  onclick="setLog(this,125)">≤ 125%</button>
        <button class="filter-btn"        data-log="110"  onclick="setLog(this,110)">≤ 110%</button>
        <button class="filter-btn"        data-log="100"  onclick="setLog(this,100)">≤ 100%</button>
      </div>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div id="content">
    <div class="state-box">
      <div class="ico">🏭</div>
      <h3>Нажмите «Обновить» для загрузки данных</h3>
      <p>Коэффициенты приёмки на ближайшие 14 дней,<br>логистика и хранение по складам Wildberries.</p>
    </div>
  </div>
</div>

<script>
// Прямые запросы к WB API (без n8n — нет CORS проблем с посредником)
const WB_TOKEN = 'eyJhbGciOiJFUzI1NiIsImtpZCI6IjIwMjUwOTA0djEiLCJ0eXAiOiJKV1QifQ.eyJhY2MiOjEsImVudCI6MSwiZXhwIjoxNzg3ODk1ODUzLCJpZCI6IjAxOWM5YjBkLTFhYzAtN2M2Ni04ZmE0LTAxYzgyOTU3ZTNjZSIsImlpZCI6MjMwOTk4ODYsIm9pZCI6NDAzODYyOCwicyI6MTA3Mzc0MTg3Miwic2lkIjoiMzY1N2IzMmMtMzQ1NC00MjFhLWE2OWItNmFmZGIxNDIzMTlmIiwidCI6ZmFsc2UsInVpZCI6MjMwOTk4ODZ9.rttnRBrfaovQHYfEx6a0w0QudsIZ2xRdu66JskIybwKvVxQLNMjXqaBlmFpKulC2RmoxuIlW2OgX6f8r1VSRnQ';
const API_ACCEPT = 'https://common-api.wildberries.ru/api/tariffs/v1/acceptance/coefficients';
const API_BOX    = 'https://common-api.wildberries.ru/api/v1/tariffs/box';

const BOX_TYPE_NAMES = { 1:'Короб', 2:'Монопаллет', 3:'Суперсейф', 5:'Суперсейф QR', 6:'Монопаллет QR' };
const DOW = ['вс','пн','вт','ср','чт','пт','сб'];
const GEO_ABBR = { 'Центральный':'ЦФО','Северо-Западный':'СЗФО','Приволжский':'ПФО','Южный':'ЮФО','Северо-Кавказский':'СКФО','Уральский':'УФО','Сибирский':'СФО','Дальневосточный':'ДВФО' };

let state = { data: null, mxc: 5, tp: 'all', boxTypeID: 1, maxLog: 9999 };

async function wbFetch(url) {
  const res = await fetch(url, { headers: { 'Authorization': WB_TOKEN } });
  if (!res.ok) {
    const t = await res.text().catch(()=>'');
    throw new Error('WB API ' + res.status + ': ' + t.slice(0,200));
  }
  return res.json();
}

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading'); btn.disabled = true;
  hideErr();
  try {
    const today = new Date().toISOString().slice(0,10);
    const [acceptRaw, boxRaw] = await Promise.all([
      wbFetch(API_ACCEPT),
      wbFetch(API_BOX + '?date=' + today)
    ]);
    const acceptCoefs = Array.isArray(acceptRaw) ? acceptRaw : [];
    const boxTariffs  = boxRaw?.response?.data?.warehouseList || [];
    state.data = process({ acceptCoefs, boxTariffs });
    document.getElementById('lastUpdate').textContent =
      'Обновлено: ' + new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) +
      ' · приёмка: ' + acceptCoefs.length + ' записей, тарифы: ' + boxTariffs.length + ' складов';
    rebuildFilters();
    render();
  } catch(e) {
    showErr(e.message);
    document.getElementById('content').innerHTML = `<div class="state-box"><div class="ico">🔍</div><h3>Ошибка загрузки</h3><p style="font-family:monospace;font-size:11px;text-align:left;background:#080c10;padding:12px;border-radius:8px;margin-top:12px;border:1px solid #1a2333;word-break:break-word">${e.message}</p></div>`;
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function process(raw) {
  let accept = Array.isArray(raw) ? raw : (raw.acceptCoefs || raw.result?.acceptCoefs || []);
  let boxT   = raw.boxTariffs || raw.result?.boxTariffs || raw.response?.data?.warehouseList || [];
  const today = new Date().toISOString().slice(0,10);

  // Индекс тарифов по имени склада
  const tmap = {};
  for (const t of boxT) tmap[t.warehouseName] = t;

  // Индекс acceptance-данных по имени склада (для поиска deliveryCoef)
  const amap = {}; // warehouseName -> [{delC, storC, coef, date, ...}]
  for (const d of accept) {
    if (!amap[d.warehouseName]) amap[d.warehouseName] = [];
    amap[d.warehouseName].push(d);
  }

  // Строим список складов ПРЕЖДЕ ВСЕГО из box tariffs — там все склады с логистикой
  const wmap = {};

  // 1. Добавляем все склады из box tariffs API
  for (const t of boxT) {
    if (!t.warehouseName) continue;
    const _lv = parseFloat(t.boxDeliveryCoefExpr);
    const _sv = parseFloat(t.boxStorageCoefExpr);
    // API может отдавать коэффициент (1.15) или процент (115) — нормализуем
    const logPct  = !isNaN(_lv) ? (_lv < 10 ? Math.round(_lv * 100) : Math.round(_lv)) : null;
    const storPct = !isNaN(_sv) ? (_sv < 10 ? Math.round(_sv * 100) : Math.round(_sv)) : null;
    const id = t.warehouseID || ('box_' + t.warehouseName);
    wmap[t.warehouseName] = {
      id,
      name: t.warehouseName,
      isSC: false,
      geo: geoShort(t.geoName),
      tariff: t,
      logPct,   // % логистики напрямую из тарифов
      storPct,
      days: {}
    };
  }

  // 2. Накладываем acceptance-данные (даты приёмки, коэффициенты)
  for (const d of accept) {
    const name = d.warehouseName;
    const id = d.warehouseID;
    if (!wmap[name]) {
      // Склад есть в acceptance но не в tariffs — добавляем
      wmap[name] = { id, name, isSC: !!d.isSortingCenter, geo: null, tariff: null, logPct: null, storPct: null, days: {} };
    }
    wmap[name].id = id; // обновляем реальный id
    wmap[name].isSC = !!d.isSortingCenter;
    const dateKey = d.date.slice(0,10);
    // Для каждой даты берём ЛУЧШИЙ coef по всем типам упаковки
    // (WB не разделяет Коробы по boxTypeID в этом API)
    const existing = wmap[name].days[dateKey];
    const newCoef = d.coefficient;
    if (!existing) {
      wmap[name].days[dateKey] = {
        date: dateKey, coef: newCoef,
        btype: d.boxTypeID||1, storC: d.storageCoef, delC: d.deliveryCoef
      };
    } else {
      // Берём лучший (наименьший неотрицательный) коэф, или -1 только если ВСЕ -1
      if (existing.coef === -1 && newCoef >= 0) existing.coef = newCoef;
      else if (existing.coef >= 0 && newCoef >= 0 && newCoef < existing.coef) existing.coef = newCoef;
      if (d.deliveryCoef) existing.delC = d.deliveryCoef;
    }
    // deliveryCoef из acceptance API НЕ соответствует логистике % в WB Partners
    // Поэтому для СЦ (нет box tariffs) оставляем logPct=null — не фильтруем по логистике
    // Отображаем logPct из acceptance только для информации с пометкой "~"
    if (wmap[name].logPct === null && d.deliveryCoef != null && d.deliveryCoef > 0) {
      wmap[name].logPctApprox = Math.round(d.deliveryCoef * 100); // приблизительное, не для фильтрации
    }
  }

  const btypes = new Set();
  Object.values(wmap).forEach(w => Object.values(w.days).forEach(d => btypes.add(d.btype)));
  // Добавляем btype=1 (Короб) если вообще есть данные tariffs — они всегда для коробов
  if (boxT.length) btypes.add(1);


  

  return { warehouses: Object.values(wmap), today, btypes: [...btypes].sort() };
}

function geoShort(name) {
  if (!name) return null;
  for (const k of Object.keys(GEO_ABBR)) if (name.includes(k)) return k;
  return name.split(' ')[0];
}

function rebuildFilters() {
  const { warehouses, btypes } = state.data;
  // Авто-выбор: если текущий тип поставки отсутствует в данных — берём первый доступный
  if (btypes.length && !btypes.includes(state.boxTypeID)) {
    state.boxTypeID = btypes.includes(1) ? 1 : btypes[0];
  }

  document.getElementById('fBox').innerHTML = btypes.map(t=>`<button class="filter-btn ${state.boxTypeID===t?'active':''}" onclick="setBox(this,${t})">${BOX_TYPE_NAMES[t]||'Тип '+t}</button>`).join('');
}

function setMxc(btn,v) { state.mxc=v; document.querySelectorAll('[data-mxc]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(state.data)render(); }
function setTp(btn,v)  { state.tp=v;  document.querySelectorAll('[data-tp]').forEach(b=>b.classList.remove('active'));  btn.classList.add('active'); if(state.data)render(); }
function setBox(btn,v) { state.boxTypeID=v; document.querySelectorAll('#fBox .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(state.data)render(); }
function setLog(btn,v) { state.maxLog=v; document.querySelectorAll('[data-log]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(state.data)render(); }

function render() {
  const { warehouses, today } = state.data;
  const dates = [];
  for (let i=0;i<14;i++) { const d=new Date(today+'T12:00:00'); d.setDate(d.getDate()+i); dates.push(d.toISOString().slice(0,10)); }
  const getBD = w => Object.values(w.days).filter(d=>d.coef>=0);
  // Get logistics % for a warehouse
  function getLogPct(w) {
    // Только box tariffs API даёт точные значения логистики %
    // deliveryCoef из acceptance API не соответствует WB Partners — не используем для фильтрации
    return w.logPct != null ? w.logPct : null;
  }

  const HIDDEN = ['цифровой склад', 'ташкент', 'ташкент 2'];
  const rows = warehouses.filter(w => {
    const wl = w.name.toLowerCase();
    // Скрываем зарубежные и служебные склады
    if (wl.startsWith('маркетплейс')) return false;
    if (HIDDEN.some(h => wl === h)) return false;
    if (state.tp==='wh'&&w.isSC) return false;
    if (state.tp==='sc'&&!w.isSC) return false;
    // Фильтр по логистике
    if (state.maxLog < 9999) {
      const logPct = getLogPct(w);
      if (logPct !== null && logPct > state.maxLog) return false;
    }
    // Для коробов: acceptance API не возвращает данные — используем box tariffs
    // Показываем только если у склада ЕСТЬ слоты приёмки (любой тип) ИЛИ это короб с тарифом
    const allDays = Object.values(w.days);
    const hasAnySlots = allDays.some(d => d.coef >= 0);
    const bd = getBD(w); // слоты для текущего типа поставки

    // Показываем склад если есть тариф (box tariffs) ИЛИ acceptance-данные
    const hasData = w.tariff != null || allDays.length > 0;
    if (!hasData) return false;
    // Скрываем если ЕСТЬ acceptance-данные но ВСЕ дни закрыты
    if (allDays.length > 0 && !hasAnySlots) return false;

    // Фильтр по мин. коэффициенту приёмки
    if (bd.length && Math.min(...bd.map(d=>d.coef)) > state.mxc) return false;

    return true;
  }).sort((a,b)=>{
    const bda=getBD(a), bdb=getBD(b);
    const am = bda.length ? Math.min(...bda.map(d=>d.coef)) : Infinity;
    const bm = bdb.length ? Math.min(...bdb.map(d=>d.coef)) : Infinity;
    // Склады с acceptance-данными — вверх, остальные по алфавиту
    if (am !== bm) return am - bm;
    return a.name.localeCompare(b.name, 'ru');
  });

  const avlToday=rows.filter(w=>w.days[today]?w.days[today].coef>=0:w.tariff!=null).length;
  const freeToday=rows.filter(w=>w.days[today]?w.days[today].coef===0:false).length;
  const freeAny=rows.filter(w=>Object.values(w.days).some(d=>d.coef===0)).length;
  const avgArr=rows.map(w=>{const bd=getBD(w);return bd.length?Math.min(...bd.map(d=>d.coef)):null;}).filter(x=>x!==null);
  const avg=avgArr.length?(avgArr.reduce((a,b)=>a+b,0)/avgArr.length).toFixed(1):'—';

  document.getElementById('summary').innerHTML=`
    <div class="summary-card"><div class="val col-green">${rows.length}</div><div class="lbl">Складов по фильтру</div></div>
    <div class="summary-card"><div class="val ${avlToday>0?'col-green':'col-orange'}">${avlToday}</div><div class="lbl">Доступны сегодня</div></div>
    <div class="summary-card"><div class="val ${freeToday>0?'col-green':'col-gray'}">${freeToday}</div><div class="lbl">Бесплатная приёмка сегодня</div></div>
    <div class="summary-card"><div class="val ${freeAny>0?'col-green':'col-gray'}">${freeAny}</div><div class="lbl">Бесплатная на 14 дней</div></div>
    <div class="summary-card"><div class="val ${parseFloat(avg)<=2?'col-green':parseFloat(avg)<=4?'col-yellow':'col-orange'}">${avg}</div><div class="lbl">Средний мин. коэффициент</div></div>`;

  if (!rows.length) { document.getElementById('content').innerHTML='<div class="state-box"><div class="ico">🔍</div><h3>Нет складов по выбранным фильтрам</h3><p>Расширьте фильтры</p></div>'; return; }

  const hdates=dates.map(d=>{const dt=new Date(d+'T12:00:00'),wd=dt.getDay(),isT=d===today,isW=wd===0||wd===6;return`<th class="th-center ${isT?'th-today':isW?'th-wknd':''}" style="min-width:40px"><div>${dt.getDate()}</div><div style="font-weight:400;font-size:10px">${DOW[wd]}</div></th>`;}).join('');

  const trows=rows.map(w=>{
    const bd=getBD(w);
    const dcells=dates.map(d=>{
      let day = w.days[d];
      // Подставляем coef=0 только если склад имеет acceptance-данные (хоть за одну дату)
      // Для складов только из box tariffs (нет acceptance) — показываем "—"
      const hasAcceptData = Object.keys(w.days).length > 0;
      if (!day && w.tariff && hasAcceptData) day = { date: d, coef: 0 };
      const isT=d===today;
      let cls='c-off',lbl='—',tip='Нет данных';
      if(day){if(day.coef<0){cls='c-off';lbl='✗';tip='Недоступно';}else if(day.coef===0){cls='c-free';lbl='Б';tip='Бесплатно';}else if(day.coef===1){cls='c-1';lbl='×1';tip='×1 = 3,5 ₽/л';}else if(day.coef===2){cls='c-2';lbl='×2';tip='×2 = 7 ₽/л';}else if(day.coef===3){cls='c-3';lbl='×3';tip='×3 = 10,5 ₽/л';}else if(day.coef===4){cls='c-4';lbl='×4';tip='×4 = 14 ₽/л';}else if(day.coef===5){cls='c-5';lbl='×5';tip='×5 = 17,5 ₽/л';}else{cls='c-high';lbl='×'+day.coef;tip='×'+day.coef+' = '+(3.5*day.coef).toFixed(1)+' ₽/л';}}
      return`<td class="td-coef"><span class="coef-pill ${cls}${isT?' c-today':''}" title="${tip}">${lbl}</span></td>`;
    }).join('');
    const mn=bd.length?Math.min(...bd.map(d=>d.coef)):null,mnDay=mn!==null?bd.find(d=>d.coef===mn)?.date:null;
    const mnStr=mnDay?(mnDay===today?'сегодня':new Date(mnDay+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'})):'—';
    let mnCls='c-off',mnLbl='—';
    if(mn!==null){if(mn===0){mnCls='c-free';mnLbl='Бесплатно';}else if(mn===1){mnCls='c-1';mnLbl='×1';}else if(mn<=3){mnCls='c-2';mnLbl='×'+mn;}else if(mn<=5){mnCls='c-4';mnLbl='×'+mn;}else{mnCls='c-high';mnLbl='×'+mn;}}
    let logV='—',stoV='—';
    const lc = w.logPct ?? w.logPctApprox;
    const lcExact = w.logPct != null;
    const sc2 = w.storPct;
    if (lc != null && !isNaN(lc)) {
      const badge = lc>150?'pct-hi':lc>125?'pct-mid':'pct-ok';
      logV = `<span class="pct-badge ${badge}" title="${lcExact?'Точные данные':'Приблизительно (СЦ)'}">${lcExact?'':'~'}${lc}%</span>`;
    }
    if (sc2 != null && !isNaN(sc2)) stoV = `<span class="pct-badge ${sc2>150?'pct-hi':sc2>100?'pct-mid':'pct-ok'}">${sc2}%</span>`;
    return`<tr><td class="td-name"><div class="wd-name">${w.name}${w.isSC?'<span class="badge-sc">СЦ</span>':''}</div>${w.geo?`<div class="wd-geo">${GEO_ABBR[w.geo]||w.geo}</div>`:''}</td>${dcells}<td class="td-stat"><span class="coef-pill ${mnCls}" style="width:auto;padding:0 8px">${mnLbl}</span><span class="min-coef-date">${mnStr}</span></td><td class="td-stat">${logV}</td><td class="td-stat">${stoV}</td></tr>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="table-wrap">
      <table>
        <thead><tr><th class="th-left" style="width:180px">Склад</th>${hdates}<th class="th-center" style="min-width:90px">Мин. коэф</th><th class="th-center" style="min-width:72px" title="Коэффициент логистики">Логистика</th><th class="th-center" style="min-width:72px" title="Коэффициент хранения">Хранение</th></tr></thead>
        <tbody>${trows}</tbody>
      </table>
      <div class="legend">
        <b style="color:#4a5568">Приёмка:</b>
        <span class="legend-item"><span class="legend-pill c-free">Б</span> Бесплатно</span>
        <span class="legend-item"><span class="legend-pill c-1">×1</span> 3,5 ₽/л</span>
        <span class="legend-item"><span class="legend-pill c-2">×2</span> 7 ₽/л</span>
        <span class="legend-item"><span class="legend-pill c-3">×3</span></span>
        <span class="legend-item"><span class="legend-pill c-4">×4–5</span></span>
        <span class="legend-item"><span class="legend-pill c-high">×N</span> Дорого</span>
        <span class="legend-item"><span class="legend-pill c-off">✗</span> Закрыто</span>
        <span style="margin-left:auto"><span class="pct-badge pct-ok">≤125%</span>&nbsp;<span class="pct-badge pct-mid">126–150%</span>&nbsp;<span class="pct-badge pct-hi">&gt;200%</span>&nbsp;— логистика/хранение от базы</span>
      </div>
    </div>`;
}

function showErr(msg) { const el=document.getElementById('errBar'); el.textContent='⚠️ '+msg; el.classList.add('show'); }
function hideErr()    { document.getElementById('errBar').classList.remove('show'); }
</script>
</body>
</html>
