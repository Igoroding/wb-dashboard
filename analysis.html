<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анализ товаров — Рука на Пульсе</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geologica:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c10;--s1:#0d1117;--s2:#111820;--border:#1a2333;--wb:#cb11ab;--green:#05d69e;--yellow:#ffc442;--red:#ff4f6e;--blue:#3b9eff;--text:#dde4ee;--muted:#4a5568;--muted2:#718096;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(203,17,171,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(203,17,171,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px;}
  .controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .shop-btn,.period-btn,.vt{padding:7px 18px;border:1px solid var(--border);border-radius:8px;background:var(--s1);color:var(--muted2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Geologica',sans-serif;}
  .shop-btn.active,.vt.active{background:var(--wb);border-color:var(--wb);color:#fff;}
  .period-btn.active{background:var(--s2);border-color:var(--muted);color:var(--text);}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .sc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px 22px;}
  .sc-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
  .sc-val{font-family:'Bebas Neue';font-size:38px;letter-spacing:1px;line-height:1;}
  .sc-sub{font-size:11px;color:var(--muted2);margin-top:4px;}
  .view-toggle{display:flex;gap:6px;margin-bottom:20px;}
  .legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);}
  .leg-dot{width:10px;height:10px;border-radius:50%;}
  .tbl-controls{display:flex;gap:10px;align-items:center;padding:14px 16px;background:var(--s1);border:1px solid var(--border);border-radius:14px 14px 0 0;border-bottom:none;flex-wrap:wrap;}
  .tbl-search{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px;font-family:'Geologica',sans-serif;width:220px;}
  .tbl-search:focus{outline:none;border-color:var(--wb);}
  .sel-count{font-size:12px;color:var(--muted2);margin-left:auto;}
  .btn-exclude{background:var(--red);border:none;border-radius:8px;padding:7px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Geologica',sans-serif;transition:opacity .2s;display:none;}
  .btn-exclude:hover{opacity:.85;}
  .btn-exclude.show{display:block;}
  .tbl-wrap{background:var(--s1);border:1px solid var(--border);border-radius:0 0 14px 14px;overflow:hidden;margin-bottom:24px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:var(--s2);padding:11px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
  th:hover{color:var(--text);}
  th:not(:first-child):not(:nth-child(2)){text-align:right;}
  td{padding:10px 14px;border-bottom:1px solid rgba(26,35,51,0.6);}
  td:not(:first-child):not(:nth-child(2)){text-align:right;font-weight:600;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  tr.excluded-row td{opacity:.4;}
  tr.selected-row td{background:rgba(203,17,171,0.05);}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;}
  .badge-a{background:rgba(5,214,158,0.15);color:var(--green);}
  .badge-b{background:rgba(255,196,66,0.15);color:var(--yellow);}
  .badge-c{background:rgba(113,128,150,0.15);color:var(--muted2);}
  .badge-x{background:rgba(255,79,110,0.15);color:var(--red);}
  .badge-excl{background:rgba(203,17,171,0.15);color:var(--wb);}
  input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--wb);}
  .mini-bar{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-left:6px;}
  .excl-wrap{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;}
  .excl-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .excl-title{font-size:13px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
  .excl-empty{padding:40px;text-align:center;color:var(--muted2);font-size:13px;}
  .excl-item{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(26,35,51,0.6);gap:12px;}
  .excl-item:last-child{border-bottom:none;}
  .excl-article{font-weight:700;color:var(--text);flex:1;}
  .excl-shop{font-size:12px;color:var(--muted2);}
  .excl-date{font-size:11px;color:var(--muted);}
  .btn-remove{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--muted2);font-size:11px;cursor:pointer;font-family:'Geologica',sans-serif;transition:all .2s;}
  .btn-remove:hover{border-color:var(--red);color:var(--red);}
  .loading{text-align:center;padding:60px;color:var(--muted2);}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--wb);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:40px;color:var(--muted2);font-size:13px;}
</style>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
<script src="/wb-dashboard/header.js"></script>
<div class="wrap">
  <div id="loading" class="loading"><div class="spinner"></div>Загружаем данные...</div>
  <div id="app" style="display:none">
    <div class="controls">
      <div style="display:flex;gap:6px">
        <button class="shop-btn active" onclick="setShop('stolnikov',this)">Стольников</button>
        <button class="shop-btn" onclick="setShop('oding',this)">Одинг</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="period-btn active" onclick="setPeriod(7,this)">7 дней</button>
        <button class="period-btn" onclick="setPeriod(14,this)">14 дней</button>
        <button class="period-btn" onclick="setPeriod(30,this)">30 дней</button>
      </div>
    </div>
    <div class="view-toggle">
      <div class="vt active" onclick="setView('abc',this)">📊 ABC Анализ</div>
      <div class="vt" onclick="setView('excl',this)">🚫 Исключения <span id="excl-count-badge"></span></div>
    </div>
    <div id="view-abc">
      <div class="summary-grid" id="summary-grid"></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>A — топ товары (80% выручки)</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--yellow)"></div>B — средние (15%)</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--muted2)"></div>C — слабые (5%)</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>❌ Неликвид — 0 заказов</div>
      </div>
      <div class="tbl-controls">
        <input class="tbl-search" placeholder="🔍 Поиск артикула..." oninput="filterABC(this.value)">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);cursor:pointer">
          <input type="checkbox" id="show-excl" onchange="renderABC()"> Показать исключённые
        </label>
        <div class="sel-count" id="sel-count">Выбрано: 0</div>
        <button class="btn-exclude" id="btn-exclude" onclick="excludeSelected()">🚫 Исключить выбранные</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="width:32px"><input type="checkbox" id="chk-all" onchange="toggleAll(this)"></th>
            <th onclick="sortABC(1,this)">Артикул ↕</th>
            <th onclick="sortABC(2,this)">Заказов ↕</th>
            <th onclick="sortABC(3,this)">Доля ↕</th>
            <th onclick="sortABC(4,this)">Категория ↕</th>
            <th>Визуализация</th>
          </tr></thead>
          <tbody id="abc-body"></tbody>
        </table>
      </div>
    </div>
    <div id="view-excl" style="display:none">
      <div class="excl-wrap">
        <div class="excl-header">
          <div class="excl-title">🚫 Исключённые артикулы</div>
          <div style="font-size:12px;color:var(--muted2)">Не учитываются в топах продаж</div>
        </div>
        <div id="excl-list"></div>
      </div>
    </div>
  </div>
</div>
<script>
const SB='https://rkxezsfrmjvriokhzaxk.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJreGV6c2ZybWp2cmlva2h6YXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTM5MTIsImV4cCI6MjA4ODEyOTkxMn0.IOMsGZh7ZGn1LTs2UCxdBWoIWH1LGiprkgR6pwpfabw';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY};

let currentShop='stolnikov',currentPeriod=7;
let articles=[],orders=[],excluded=[],abcData=[],filtered=[],selected=new Set();
let sortDirs={};

const fmtN=n=>new Intl.NumberFormat('ru-RU').format(Math.round(n));

async function get(path){const r=await fetch(SB+path,{headers:H});return r.json();}
async function post(path,body){return fetch(SB+path,{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(body)});}
async function del(path){return fetch(SB+path,{method:'DELETE',headers:H});}

function setShop(s,el){currentShop=s;document.querySelectorAll('.shop-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setPeriod(d,el){currentPeriod=d;document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setView(v,el){
  document.querySelectorAll('.vt').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById('view-abc').style.display=v==='abc'?'block':'none';
  document.getElementById('view-excl').style.display=v==='excl'?'block':'none';
  if(v==='excl')renderExcl();
}

function getOrders(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-currentPeriod);
  const from=cutoff.toLocaleDateString('sv-SE');
  return orders.filter(r=>r.shop===currentShop&&r.date>=from);
}

function buildABC(){
  const ord=getOrders();
  const byArt={};
  for(const a of articles) byArt[a]={article:a,orders:0};
  for(const r of ord){
    if(byArt[r.article]) byArt[r.article].orders+=r.orders_count||0;
  }
  const items=Object.values(byArt).sort((a,b)=>b.orders-a.orders);
  const total=items.reduce((s,i)=>s+i.orders,0);
  let cum=0;
  for(const item of items){
    const pct=total>0?item.orders/total*100:0;
    item.pct=pct; cum+=pct; item.cum=cum;
    item.excluded=excluded.some(e=>e.article===item.article&&e.shop===currentShop);
    if(item.orders===0) item.cat='X';
    else if(cum<=80) item.cat='A';
    else if(cum<=95) item.cat='B';
    else item.cat='C';
  }
  return items;
}

function render(){
  selected.clear();updateSelCount();
  abcData=buildABC();filtered=[...abcData];
  renderSummary();renderABC();
}

function renderSummary(){
  const a=abcData.filter(i=>i.cat==='A').length;
  const b=abcData.filter(i=>i.cat==='B').length;
  const c=abcData.filter(i=>i.cat==='C').length;
  const x=abcData.filter(i=>i.cat==='X').length;
  document.getElementById('summary-grid').innerHTML=[
    {label:'Всего артикулов',val:fmtN(abcData.length),sub:'в анализируемом списке',col:'var(--blue)'},
    {label:'A — топ товары',val:fmtN(a),sub:'дают 80% заказов',col:'var(--green)'},
    {label:'B+C — средние',val:fmtN(b+c),sub:'остальные заказы',col:'var(--yellow)'},
    {label:'❌ Неликвид',val:fmtN(x),sub:'0 заказов за период',col:'var(--red)'},
  ].map(s=>`<div class="sc"><div class="sc-label">${s.label}</div><div class="sc-val" style="color:${s.col}">${s.val}</div><div class="sc-sub">${s.sub}</div></div>`).join('');
}

function renderABC(){
  const showExcl=document.getElementById('show-excl').checked;
  const maxOrd=filtered.length>0?Math.max(...filtered.map(i=>i.orders),1):1;
  let rows=filtered;
  if(!showExcl) rows=rows.filter(i=>!i.excluded);
  const badgeCls={A:'badge-a',B:'badge-b',C:'badge-c',X:'badge-x'};
  const badgeLbl={A:'A',B:'B',C:'C',X:'❌'};
  const barCol={A:'var(--green)',B:'var(--yellow)',C:'var(--muted)',X:'var(--red)'};
  document.getElementById('abc-body').innerHTML=rows.map(item=>{
    const id='row-'+item.article.replace(/[^a-zA-Z0-9]/g,'_');
    const isSel=selected.has(item.article);
    const barW=Math.round(item.orders/maxOrd*120);
    return `<tr class="${item.excluded?'excluded-row':''} ${isSel?'selected-row':''}" id="${id}">
      <td><input type="checkbox" ${isSel?'checked':''} ${item.excluded?'disabled':''} onchange="toggleSel('${item.article}',this)"></td>
      <td style="font-weight:700">${item.article}${item.excluded?' <span class="badge badge-excl">исключён</span>':''}</td>
      <td>${fmtN(item.orders)}</td>
      <td style="color:var(--muted2)">${item.pct.toFixed(1)}%</td>
      <td><span class="badge ${badgeCls[item.cat]}">${badgeLbl[item.cat]}</span></td>
      <td><div class="mini-bar" style="width:${barW}px;background:${barCol[item.cat]}"></div></td>
    </tr>`;
  }).join('')||'<tr><td colspan="6" class="empty">Нет данных</td></tr>';
}

function filterABC(q){filtered=abcData.filter(i=>i.article.toLowerCase().includes(q.toLowerCase()));renderABC();}

function toggleSel(art,cb){
  if(cb.checked)selected.add(art);else selected.delete(art);
  const row=document.getElementById('row-'+art.replace(/[^a-zA-Z0-9]/g,'_'));
  if(row)row.classList.toggle('selected-row',cb.checked);
  updateSelCount();
}
function toggleAll(cb){
  document.getElementById('abc-body').querySelectorAll('input[type=checkbox]:not(:disabled)').forEach(r=>{
    r.checked=cb.checked;
    const art=r.closest('tr').querySelectorAll('td')[1].childNodes[0].textContent.trim();
    if(cb.checked)selected.add(art);else selected.delete(art);
    r.closest('tr').classList.toggle('selected-row',cb.checked);
  });
  updateSelCount();
}
function updateSelCount(){
  const n=selected.size;
  document.getElementById('sel-count').textContent=`Выбрано: ${n}`;
  document.getElementById('btn-exclude').classList.toggle('show',n>0);
}

async function excludeSelected(){
  for(const art of selected){
    await post('/rest/v1/wb_excluded_articles?on_conflict=article',{article:art,shop:currentShop==='all'?'all':currentShop,reason:'manual'});
  }
  selected.clear();
  excluded=await get('/rest/v1/wb_excluded_articles?order=created_at.desc&limit=500')||[];
  updateExclBadge();render();
}

async function removeExcluded(art,shop){
  await del(`/rest/v1/wb_excluded_articles?article=eq.${encodeURIComponent(art)}&shop=eq.${shop}`);
  excluded=await get('/rest/v1/wb_excluded_articles?order=created_at.desc&limit=500')||[];
  updateExclBadge();render();renderExcl();
}

function renderExcl(){
  const list = excluded.filter(e => e.shop === currentShop);
  const shopLabel = currentShop==='stolnikov'?'Стольников':'Одинг';
  if(!list.length){
    document.getElementById('excl-list').innerHTML=`<div class="excl-empty">Нет исключений для магазина «${shopLabel}»</div>`;
    return;
  }
  document.getElementById('excl-list').innerHTML=list.map(e=>{
    const d=new Date(e.created_at).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
    return `<div class="excl-item">
      <div class="excl-article">${e.article}</div>
      <div class="excl-date">добавлен ${d}</div>
      <button class="btn-remove" onclick="removeExcluded('${e.article}','${currentShop}')">✕ Убрать</button>
    </div>`;
  }).join('');
}

function updateExclBadge(){
  const b=document.getElementById('excl-count-badge');
  b.textContent=excluded.length>0?` (${excluded.length})`:'';
}

async function init(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-90);
  const from=cutoff.toLocaleDateString('sv-SE');
  const [arts,ords,excl]=await Promise.all([
    get('/rest/v1/wb_articles?active=eq.true&limit=500'),
    get(`/rest/v1/wb_warehouse_stats?date=gte.${from}&limit=200000`),
    get('/rest/v1/wb_excluded_articles?order=created_at.desc&limit=500')
  ]);
  articles=(arts||[]).map(a=>a.article);
  orders=ords||[];
  excluded=excl||[];
  updateExclBadge();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
init();
</script>
</body>
</html>
